spring.application.name=notification-system
server.port=8080

# ============================================================
# PostgreSQL / Supabase Database Configuration
# ============================================================

#original one commented
#spring.datasource.url=jdbc:postgresql://db.qqxtajygixhayaqoiqjv.supabase.co:6543/postgres?sslmode=require

# Transaction mode (port 6543) uses pgbouncer for server-side pooling
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.qqxtajygixhayaqoiqjv
spring.datasource.password=Vivek@1231243088
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - keep small for Supabase free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.ssl=true

# ============================================================
# JPA / Hibernate Configuration
# ============================================================

# chagpt said change none to update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate auto-detects the dialect; explicit setting is deprecated
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================================
# Logging
# ============================================================
logging.level.com.notify=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# ============================================================
# Email / JavaMailSender Configuration
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Set to false to disable real mail sending in dev
app.mail.enabled=${MAIL_ENABLED:false}

# ============================================================
# Digest Scheduler
# Cron: "0 0 8 * * *" = 08:00 AM every day
# ============================================================
app.digest.cron=${DIGEST_CRON:0 0 8 * * *}

